name: Production Deployment

on:
  push:
    branches: [main] # This triggers the script on every push to main

# Prevent multiple deployments from clashing
concurrency:
  group: backend_deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy (Backend)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navigate to the app directory
            cd ~/carnival/backend

            # 2. Update the code directly in this folder
            # We assume this folder is already a git repo. If not, see 'The Reset' below.
            git fetch origin main
            git reset --hard origin/main

            # 3. Run your existing Blue-Green hook script
            bash ~/carnival/repo-backend.git/hooks/post-receive
